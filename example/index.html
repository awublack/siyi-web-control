<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYI 云台测试工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card h2 { color: #00d9ff; margin-bottom: 15px; font-size: 18px; border-bottom: 1px solid rgba(0, 217, 255, 0.3); padding-bottom: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; margin: 3px; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #00d9ff, #0077b6); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #51cf66, #37b24d); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #ffd43b, #f08c00); color: #000; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-group { margin: 10px 0; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.3); color: #fff; }
        .status-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .status-label { color: #aaa; }
        .status-value { font-weight: bold; color: #00d9ff; }
        .log-box { background: rgba(0, 0, 0, 0.5); border-radius: 8px; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 11px; }
        .log-info { color: #00d9ff; }
        .log-success { color: #51cf66; }
        .log-warning { color: #ffd43b; }
        .log-error { color: #ff6b6b; }
        .connection-status { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .conn-ok { background: rgba(81, 207, 102, 0.2); border: 1px solid #51cf66; color: #51cf66; }
        .conn-error { background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff6b6b; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; }
        .video-container video, .video-container canvas { width: 100%; height: 100%; }
        .joystick-area { position: relative; width: 200px; height: 200px; margin: 0 auto; background: rgba(0, 0, 0, 0.3); border-radius: 50%; border: 2px solid rgba(0, 217, 255, 0.3); }
        .joystick-knob { position: absolute; width: 50px; height: 50px; background: radial-gradient(circle, #00d9ff, #0077b6); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; }
        .mode-indicator { padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; margin: 10px 0; }
        .mode-lock { background: rgba(81, 207, 102, 0.3); color: #51cf66; }
        .mode-follow { background: rgba(0, 217, 255, 0.3); color: #00d9ff; }
        .mode-fpv { background: rgba(255, 212, 59, 0.3); color: #ffd43b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 SIYI 云台测试工具 - 完整功能覆盖</h1>
        
        <div class="connection-status conn-error" id="connStatus">🔴 未连接</div>
        
        <div class="grid">
            <!-- 连接控制 -->
            <div class="card">
                <h2>📡 连接控制</h2>
                <div class="input-group">
                    <label>相机 IP</label>
                    <input type="text" id="cameraIp" value="192.168.144.25" readonly>
                </div>
                <button class="btn btn-success" onclick="connect()" id="btnConnect">▶ 连接</button>
                <button class="btn btn-danger" onclick="disconnect()" id="btnDisconnect" disabled>⏹ 断开</button>
                <div style="margin-top: 15px;">
                    <div class="status-item"><span class="status-label">硬件 ID</span><span class="status-value" id="hwId">-</span></div>
                    <div class="status-item"><span class="status-label">固件版本</span><span class="status-value" id="fwVer">-</span></div>
                </div>
            </div>

            <!-- 状态显示 -->
            <div class="card">
                <h2>📊 实时状态</h2>
                <div class="status-item"><span class="status-label">Yaw</span><span class="status-value" id="yaw">0.0°</span></div>
                <div class="status-item"><span class="status-label">Pitch</span><span class="status-value" id="pitch">0.0°</span></div>
                <div class="status-item"><span class="status-label">Roll</span><span class="status-value" id="roll">0.0°</span></div>
                <div class="status-item"><span class="status-label">变焦倍率</span><span class="status-value" id="zoom">1.0x</span></div>
                <div class="status-item"><span class="status-label">温度</span><span class="status-value" id="temp">--°C</span></div>
                <div class="status-item"><span class="status-label">录像</span><span class="status-value" id="recState">停止</span></div>
                <div id="modeIndicator" class="mode-indicator mode-lock">🔒 锁定模式</div>
            </div>

            <!-- 云台控制 -->
            <div class="card">
                <h2>🎮 云台控制</h2>
                <div class="joystick-area" id="joystick">
                    <div class="joystick-knob" id="joystickKnob"></div>
                </div>
                <div style="text-align: center; margin-top: 10px; font-size: 11px; color: #aaa;">拖拽摇杆控制云台</div>
                <div style="margin-top: 15px;">
                    <button class="btn btn-primary" onclick="centerGimbal()">🎯 回中</button>
                    <button class="btn btn-warning" onclick="resetGimbal()">🔄 重置</button>
                </div>
                <div class="input-group">
                    <label>设置绝对角度 (Yaw, Pitch)</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="setYaw" placeholder="Yaw" value="0">
                        <input type="number" id="setPitch" placeholder="Pitch" value="0">
                    </div>
                    <button class="btn btn-primary" onclick="setAngles()" style="margin-top: 5px; width: 100%;">设置角度</button>
                </div>
                <div class="input-group">
                    <label>云台模式</label>
                    <select id="modeSelect" onchange="setMode()">
                        <option value="LOCK">🔒 锁定模式</option>
                        <option value="FOLLOW">📍 跟随模式</option>
                        <option value="FPV">✈️ FPV 模式</option>
                    </select>
                </div>
            </div>

            <!-- 变焦对焦 -->
            <div class="card">
                <h2>🔭 变焦 & 对焦</h2>
                <div class="input-group">
                    <label>手动变焦 (-40 ~ 40)</label>
                    <input type="range" id="zoomSlider" min="-40" max="40" value="0" oninput="updateZoomLabel()">
                    <div style="text-align: center; font-size: 12px; color: #aaa;" id="zoomLabel">0</div>
                    <button class="btn btn-primary" onclick="zoomManual(parseInt(document.getElementById('zoomSlider').value))" style="margin-top: 5px; width: 100%;">执行变焦</button>
                </div>
                <div class="input-group">
                    <label>绝对变焦 (1.0 ~ 40.0)</label>
                    <input type="number" id="absZoom" value="1.0" step="0.1" min="1.0" max="40.0">
                    <button class="btn btn-primary" onclick="zoomAbsolute()" style="margin-top: 5px; width: 100%;">设置</button>
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn btn-success" onclick="autoFocus()">🎯 自动对焦</button>
                    <button class="btn btn-primary" onclick="manualFocus()" style="width: 100%; margin-top: 5px;">手动对焦</button>
                </div>
            </div>

            <!-- 录像 & 温度 -->
            <div class="card">
                <h2>📹 录像 & 温度</h2>
                <button class="btn btn-success" id="btnRecord" onclick="toggleRecord()" style="width: 100%;">▶ 开始录像</button>
                <div class="input-group" style="margin-top: 15px;">
                    <label>测温点 (X, Y 0-1)</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="tempX" value="0.5" step="0.1" min="0" max="1">
                        <input type="number" id="tempY" value="0.5" step="0.1" min="0" max="1">
                    </div>
                    <button class="btn btn-primary" onclick="getTemperature()" style="margin-top: 5px; width: 100%;">读取温度</button>
                </div>
            </div>

            <!-- 图像设置 -->
            <div class="card">
                <h2>🎨 图像设置</h2>
                <div class="input-group">
                    <label>显示模式</label>
                    <select id="imageMode">
                        <option value="0">分割 (变倍 + 热成像)</option>
                        <option value="1">分割 (广角 + 热成像)</option>
                        <option value="2">分割 (变倍 + 广角)</option>
                        <option value="3">单画面 (变倍)</option>
                        <option value="4">单画面 (广角)</option>
                        <option value="5">单画面 (热成像)</option>
                    </select>
                    <button class="btn btn-primary" onclick="setImageMode()" style="margin-top: 5px; width: 100%;">应用</button>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>热成像调色板</label>
                    <select id="palette">
                        <option value="0">☀️ 白热</option>
                        <option value="2">🎨 棕褐色</option>
                        <option value="3">🌈 铁红</option>
                    </select>
                    <button class="btn btn-primary" onclick="setPalette()" style="margin-top: 5px; width: 100%;">应用</button>
                </div>
            </div>

            <!-- 系统控制 -->
            <div class="card">
                <h2>⚙️ 系统控制</h2>
                <button class="btn btn-warning" onclick="softRestart()" style="width: 100%;">🔄 软重启</button>
                <button class="btn btn-primary" onclick="getGimbalInfo()" style="width: 100%; margin-top: 10px;">📋 获取云台信息</button>
            </div>

            <!-- 视频流 -->
            <div class="card" style="grid-column: span 2;">
                <h2>📺 视频流</h2>
                <div class="video-container">
                    <canvas id="videoCanvas"></canvas>
                </div>
                <div style="margin-top: 10px;">
                    <button class="btn btn-success" onclick="startVideo()" id="btnStartVideo">▶ 启动视频</button>
                    <button class="btn btn-danger" onclick="stopVideo()" id="btnStopVideo" disabled>⏹ 停止视频</button>
                    <span id="videoStatus" style="margin-left: 10px; font-size: 12px; color: #aaa;">未连接</span>
                </div>
            </div>

            <!-- 日志 -->
            <div class="card" style="grid-column: span 3;">
                <h2>📝 操作日志</h2>
                <div class="log-box" id="logBox"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8082/api';
        let ws = null;

        function log(msg, type='info') {
            const box = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
        }

        async function apiCall(endpoint, method='GET', data=null) {
            try {
                const options = { method, headers: {'Content-Type': 'application/json'} };
                if (data) options.body = JSON.stringify(data);
                const res = await fetch(API_BASE + endpoint, options);
                return await res.json();
            } catch (e) {
                log(`${endpoint} 失败：${e.message}`, 'error');
                return null;
            }
        }

        async function connect() {
            log('正在连接云台...');
            const res = await apiCall('/connect', 'POST');
            if (res && res.status === 'success') {
                document.getElementById('connStatus').className = 'connection-status conn-ok';
                document.getElementById('connStatus').textContent = '🟢 已连接';
                document.getElementById('btnConnect').disabled = true;
                document.getElementById('btnDisconnect').disabled = false;
                document.getElementById('hwId').textContent = res.hardware_id || '-';
                document.getElementById('fwVer').textContent = res.firmware_ver || '-';
                log('✅ 云台连接成功', 'success');
                startStatusPoll();
            } else {
                log('❌ 连接失败', 'error');
            }
        }

        async function disconnect() {
            const res = await apiCall('/disconnect', 'POST');
            if (res) {
                document.getElementById('connStatus').className = 'connection-status conn-error';
                document.getElementById('connStatus').textContent = '🔴 未连接';
                document.getElementById('btnConnect').disabled = false;
                document.getElementById('btnDisconnect').disabled = true;
                log('⏹ 已断开连接', 'warning');
            }
        }

        async function centerGimbal() {
            log('云台回中...');
            const res = await apiCall('/gimbal/center', 'POST');
            if (res) log(res.status === 'success' ? '✅ 回中成功' : '❌ 回中失败', res.status === 'success' ? 'success' : 'error');
        }

        async function resetGimbal() {
            log('云台重置...');
            const res = await apiCall('/gimbal/reset', 'POST');
            if (res) log(res.status === 'success' ? '✅ 重置成功' : '❌ 重置失败', res.status === 'success' ? 'success' : 'error');
        }

        async function setAngles() {
            const yaw = parseFloat(document.getElementById('setYaw').value);
            const pitch = parseFloat(document.getElementById('setPitch').value);
            log(`设置角度：Yaw=${yaw}, Pitch=${pitch}`);
            const res = await apiCall('/gimbal/set_angles', 'POST', {yaw, pitch});
            if (res) log(res.status === 'success' ? '✅ 角度设置成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function setMode() {
            const mode = document.getElementById('modeSelect').value;
            log(`切换模式：${mode}`);
            const res = await apiCall('/gimbal/set_mode', 'POST', {mode});
            if (res && res.status === 'success') {
                updateModeIndicator(mode);
                log('✅ 模式切换成功', 'success');
            }
        }

        function updateModeIndicator(mode) {
            const el = document.getElementById('modeIndicator');
            el.className = 'mode-indicator';
            if (mode === 'LOCK') { el.classList.add('mode-lock'); el.textContent = '🔒 锁定模式'; }
            else if (mode === 'FOLLOW') { el.classList.add('mode-follow'); el.textContent = '📍 跟随模式'; }
            else if (mode === 'FPV') { el.classList.add('mode-fpv'); el.textContent = '✈️ FPV 模式'; }
        }

        function updateZoomLabel() {
            document.getElementById('zoomLabel').textContent = document.getElementById('zoomSlider').value;
        }

        async function zoomManual(level) {
            log(`手动变焦：${level}`);
            const res = await apiCall('/zoom/manual', 'POST', {level});
            if (res) log(res.status === 'success' ? '✅ 变焦成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function zoomAbsolute() {
            const zoom = parseFloat(document.getElementById('absZoom').value);
            log(`绝对变焦：${zoom}x`);
            const res = await apiCall('/zoom/absolute', 'POST', {zoom});
            if (res) log(res.status === 'success' ? '✅ 变焦成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function autoFocus() {
            log('自动对焦...');
            const res = await apiCall('/focus/auto', 'POST');
            if (res) log(res.status === 'success' ? '✅ 自动对焦成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function manualFocus() {
            const focus = parseInt(prompt("输入对焦值 (0-255):", "128"));
            if (!isNaN(focus)) {
                log(`手动对焦：${focus}`);
                const res = await apiCall('/focus/manual', 'POST', {focus});
                if (res) log(res.status === 'success' ? '✅ 对焦成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
            }
        }

        let isRecording = false;
        async function toggleRecord() {
            const action = isRecording ? 'stop' : 'start';
            log(`${action === 'start' ? '开始' : '停止'}录像...`);
            const res = await apiCall('/record', 'POST', {action});
            if (res && res.status === 'success') {
                isRecording = res.state;
                document.getElementById('btnRecord').textContent = isRecording ? '⏹ 停止录像' : '▶ 开始录像';
                document.getElementById('recState').textContent = isRecording ? '录制中' : '停止';
                log(isRecording ? '✅ 开始录像' : '✅ 停止录像', 'success');
            }
        }

        async function getTemperature() {
            const x = parseFloat(document.getElementById('tempX').value);
            const y = parseFloat(document.getElementById('tempY').value);
            log(`读取温度：(${x}, ${y})`);
            const res = await apiCall('/temperature', 'POST', {x, y});
            if (res && res.status === 'success') {
                document.getElementById('temp').textContent = `${res.temperature.toFixed(1)}°C`;
                log(`✅ 温度：${res.temperature.toFixed(1)}°C`, 'success');
            }
        }

        async function setImageMode() {
            const mode = parseInt(document.getElementById('imageMode').value);
            log(`设置图像模式：${mode}`);
            const res = await apiCall('/image_mode', 'POST', {mode});
            if (res) log(res.status === 'success' ? '✅ 设置成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function setPalette() {
            const palette = parseInt(document.getElementById('palette').value);
            log(`设置调色板：${palette}`);
            const res = await apiCall('/thermal_palette', 'POST', {palette});
            if (res) log(res.status === 'success' ? '✅ 设置成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function softRestart() {
            if (!confirm('确定要重启云台/相机吗？')) return;
            log('软重启中...');
            const res = await apiCall('/restart', 'POST');
            if (res) log(res.status === 'success' ? '✅ 重启成功' : '❌ 失败', res.status === 'success' ? 'success' : 'error');
        }

        async function getGimbalInfo() {
            log('获取云台信息...');
            const res = await apiCall('/gimbal/info', 'GET');
            if (res && res.status === 'success') {
                log(`✅ 硬件 ID: ${res.info.hardware_id}`, 'success');
                log(`✅ 固件版本：${res.info.firmware_ver}`, 'success');
                log(`✅ 变焦级别：${res.info.zoom_level}`, 'success');
            }
        }

let videoElement = null;
        let videoWS = null;
        let videoRunning = false;
        
        async function startVideo() {
            log('正在启动 WebSocket 视频流...');
            
            try {
                const wsUrl = 'ws://localhost:8082/api/ws';
                videoWS = new WebSocket(wsUrl);
                videoWS.binaryType = 'arraybuffer';
                
                videoWS.onopen = () => {
                    log('✅ 视频 WebSocket 已连接', 'success');
                    videoRunning = true;
                    document.getElementById('videoStatus').textContent = '🟢 已连接';
                    document.getElementById('btnStartVideo').disabled = true;
                    document.getElementById('btnStopVideo').disabled = false;
                };
                
                videoWS.onmessage = (event) => {
                    if (!videoRunning) return;
                    
                    const canvas = document.getElementById('videoCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 创建图片对象
                    const blob = new Blob([event.data], { type: 'image/jpeg' });
                    const img = new Image();
                    
                    img.onload = () => {
                        // 设置 canvas 尺寸匹配视频
                        canvas.width = img.width;
                        canvas.height = img.height;
                        // 绘制帧
                        ctx.drawImage(img, 0, 0);
                    };
                    
                    img.src = URL.createObjectURL(blob);
                };
                
                videoWS.onerror = (error) => {
                    log(`❌ 视频 WebSocket 错误`, 'error');
                    console.error(error);
                };
                
                videoWS.onclose = () => {
                    log('视频 WebSocket 已关闭', 'warning');
                    videoRunning = false;
                    document.getElementById('videoStatus').textContent = '🔴 已断开';
                    document.getElementById('btnStartVideo').disabled = false;
                    document.getElementById('btnStopVideo').disabled = true;
                };
                
            } catch (e) {
                log(`启动视频失败：${e.message}`, 'error');
            }
        }
        
        function stopVideo() {
            if (videoWS) {
                videoWS.close();
                videoWS = null;
            }
            videoRunning = false;
            log('⏹ 视频流已停止', 'warning');
            document.getElementById('videoStatus').textContent = '未连接';
            document.getElementById('btnStartVideo').disabled = false;
            document.getElementById('btnStopVideo').disabled = true;
            
            // 清空 canvas
            const canvas = document.getElementById('videoCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        async function getStatus() {
            const res = await apiCall('/status', 'GET');
            if (res) {
                document.getElementById('yaw').textContent = `${res.attitude.yaw.toFixed(1)}°`;
                document.getElementById('pitch').textContent = `${res.attitude.pitch.toFixed(1)}°`;
                document.getElementById('roll').textContent = `${res.attitude.roll.toFixed(1)}°`;
                document.getElementById('zoom').textContent = `${res.zoom_level.toFixed(1)}x`;
                if (res.temperature > 0) document.getElementById('temp').textContent = `${res.temperature.toFixed(1)}°C`;
            }
        }

        let statusInterval = null;
        function startStatusPoll() {
            if (statusInterval) clearInterval(statusInterval);
            getStatus();
            statusInterval = setInterval(getStatus, 1000);
        }

        // 摇杆控制
        const joystick = document.getElementById('joystick');
        const joystickKnob = document.getElementById('joystickKnob');
        let isDragging = false;
        let yawSpeed = 0, pitchSpeed = 0;
        let controlInterval = null;

        joystickKnob.addEventListener('mousedown', (e) => {
            isDragging = true;
            startControl();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let x = e.clientX - centerX;
            let y = e.clientY - centerY;
            const maxDist = rect.width / 2 - 25;
            const dist = Math.sqrt(x*x + y*y);
            if (dist > maxDist) {
                x = (x / dist) * maxDist;
                y = (y / dist) * maxDist;
            }
            joystickKnob.style.left = `calc(50% + ${x}px)`;
            joystickKnob.style.top = `calc(50% + ${y}px)`;
            
            yawSpeed = Math.round((x / maxDist) * 100);
            pitchSpeed = Math.round((y / maxDist) * 100);
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                joystickKnob.style.left = '50%';
                joystickKnob.style.top = '50%';
                yawSpeed = 0;
                pitchSpeed = 0;
            }
        });

        function startControl() {
            if (controlInterval) clearInterval(controlInterval);
            controlInterval = setInterval(async () => {
                if (yawSpeed !== 0 || pitchSpeed !== 0) {
                    await apiCall('/gimbal/rotate', 'POST', {yaw_speed: yawSpeed, pitch_speed: -pitchSpeed});
                }
            }, 100);
        }

        window.addEventListener('load', () => {
            log('🚀 系统初始化完成', 'success');
        });
    </script>
</body>
</html>
