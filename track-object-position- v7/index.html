<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIYI A8 Mini 云台控制系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .video-section, .control-panel { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); }
        .video-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #videoStream { width: 100%; height: 100%; object-fit: contain; display: none; user-select: none; }
        #interactionCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .status-overlay { position: absolute; text-align: center; padding: 20px; z-index: 5; }
        .status-overlay h2 { font-size: 24px; margin-bottom: 10px; color: #00d9ff; }
        .status-item { margin: 10px 0; font-size: 16px; }
        .status-card { background: rgba(0, 0, 0, 0.3); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #00d9ff; }
        .status-item-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .status-label { color: #aaa; }
        .status-value { font-weight: bold; color: #00d9ff; }
        .mode-indicator { padding: 12px 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; transition: all 0.3s ease; font-size: 16px; }
        .mode-auto { background: linear-gradient(135deg, #00b894, #00cec9); }
        .mode-manual { background: linear-gradient(135deg, #fd79a8, #e84393); animation: pulse-manual 1s infinite alternate; }
        .mode-idle { background: linear-gradient(135deg, #636e72, #2d3436); }
        @keyframes pulse-manual { 0% { box-shadow: 0 0 5px #e84393; } 100% { box-shadow: 0 0 15px #e84393; } }
        .control-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn { padding: 14px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s ease; }
        .btn-primary { background: linear-gradient(135deg, #00d9ff, #0077b6); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; }
        .btn-success { background: linear-gradient(135deg, #51cf66, #37b24d); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f59f00, #f08c00); color: #fff; }
        .btn-active-hunting { animation: pulse-glow 1.5s infinite alternate; border: 2px solid #fff; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px #00ff88; } 100% { box-shadow: 0 0 20px #00ff88; } }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .keyboard-help { background: rgba(0, 0, 0, 0.3); border-radius: 10px; padding: 15px; margin-top: 15px; }
        .keyboard-help h3 { margin-bottom: 10px; color: #00d9ff; font-size: 14px; }
        .key-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .key-row:last-child { border-bottom: none; }
        .key { background: rgba(255, 255, 255, 0.15); padding: 3px 10px; border-radius: 4px; font-family: monospace; }
        .log-container { background: rgba(0, 0, 0, 0.5); border-radius: 8px; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-top: 15px; }
        .log-entry { margin-bottom: 3px; }
        .log-info { color: #00d9ff; } .log-success { color: #51cf66; } .log-warning { color: #ffd43b; } .log-error { color: #ff6b6b; }
        .setting-item { margin-bottom: 12px; }
        .setting-label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
        .setting-input { 
            width: 100%; padding: 8px 10px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; 
            background: rgba(0, 0, 0, 0.3); color: #fff; appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300d9ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; background-size: 16px; padding-right: 30px;
        }
        .setting-input option { background: #16213e; color: #fff; }
        .connection-status { padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .conn-ok { background: rgba(81, 207, 102, 0.2); border: 1px solid #51cf66; color: #51cf66; }
        .conn-error { background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff6b6b; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 SIYI A8 Mini 云台控制系统</h1>
        <div class="main-grid">
            <div class="video-section">
                <div class="video-container" id="videoContainer">
                    <img id="videoStream" alt="Video Stream">
                    <canvas id="interactionCanvas"></canvas>
                    <div class="status-overlay" id="videoOverlay">
                        <h2>📡 控制系统就绪</h2>
                        <div class="status-item">状态：<span class="status-value" id="mainStatus">等待启动...</span></div>
                    </div>
                </div>
                <div class="log-container" id="logContainer"></div>
            </div>
            
            <div class="control-panel">
                <div class="connection-status conn-error" id="connStatus">🔴 未连接</div>
                <div class="mode-indicator mode-idle" id="modeIndicator">⏸️ 待机中 (请框选目标)</div>
                
                <div class="status-card">
                    <div class="status-item-row"><span class="status-label">云台 Yaw</span><span class="status-value" id="statusYaw">0</span></div>
                    <div class="status-item-row"><span class="status-label">云台 Pitch</span><span class="status-value" id="statusPitch">0</span></div>
                    <div class="status-item-row"><span class="status-label">当前检测器</span><span class="status-value" id="currentDetector" style="color:#ffd43b">-</span></div>
                    <div class="status-item-row"><span class="status-label">当前跟踪器</span><span class="status-value" id="currentTracker" style="color:#ff7f50">-</span></div>
                    <div class="status-item-row"><span class="status-label">框选中心 X</span><span class="status-value" id="boxCenterX" style="color:#00ff88">-</span></div>
                    <div class="status-item-row"><span class="status-label">框选中心 Y</span><span class="status-value" id="boxCenterY" style="color:#00ff88">-</span></div>
                </div>
                
                <div class="control-buttons">
                    <button class="btn btn-success" id="btnStart" onclick="startService()">▶ 启动服务</button>
                    <button class="btn btn-primary" onclick="centerGimbal()">🎯 云台回中</button>
                    <button class="btn btn-warning" id="btnSelectRoi" onclick="enableRoiSelection()">🖱️ 框选目标</button>
                    <button class="btn btn-primary" onclick="resetTracking()">🔄 重置跟踪</button>
                    <button class="btn btn-danger" id="btnStop" onclick="stopService()" disabled style="grid-column: span 2;">⏹ 停止服务</button>
                </div>
                
                <div class="setting-item">
                    <label class="setting-label">摄像头 IP (仅作显示参考)</label>
                    <input type="text" class="setting-input" id="cameraIp" value="192.168.144.25" readonly>
                </div>
                
                <div class="setting-item">
                    <label class="setting-label">人脸检测算法 (切换后立刻生效)</label>
                    <select class="setting-input" id="detectorSelect" onchange="switchDetector()">
                        <option value="haar">Haar Cascade (极速/基础)</option>
                        <option value="lbp">LBP Cascade (抗光照)</option>
                        <option value="dnn">DNN YuNet (高精度/推荐)</option>
                    </select>
                </div>
                
                <div class="setting-item">
                    <label class="setting-label">物体跟踪算法 (切换后立刻生效)</label>
                    <select class="setting-input" id="trackerSelect" onchange="switchTracker()">
                        <!-- 核心修改：新增 Hybrid 选项并设为默认 -->
                        <option value="hybrid" selected>Hybrid (MOSSE+CSRT 融合/强烈推荐)</option>
                        <option value="mosse">MOSSE (极速/易漂移)</option>
                        <option value="kcf">KCF (平衡)</option>
                        <option value="csrt">CSRT (高精度/可能卡顿)</option>
                        <option value="dasiamrpn">DaSiamRPN (深度学习/极高精度)</option>
                        <option value="ssd">SSD (全局检测/防漂移)</option>
                    </select>
                </div>
                
                <div class="keyboard-help">
                    <h3>⌨️ 键盘与鼠标控制</h3>
                    <div class="key-row"><span><span class="key">W</span> 上 <span class="key">S</span> 下 <span class="key">A</span> 左 <span class="key">D</span> 右</span></div>
                    <div class="key-row"><span><span class="key">Shift</span> 加速 | <span class="key">Space</span> 回中</span></div>
                    <div class="key-row"><span style="color:#ffd43b;">💡 提示：框选人脸自动人脸跟踪，框选物体自动物体跟踪！</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let serviceRunning = false;
        let ws = null;
        const keysPressed = {};
        let controlInterval = null;
        
        let isMouseGimbalInteracting = false; 
        let mouseCurrentYawSpeed = 0;
        let mouseCurrentPitchSpeed = 0;
        let mouseLoopInterval = null; 

        let isRoiModeActive = false; 
        let isDrawing = false;       
        let startX = 0, startY = 0;   
        let currentX = 0, currentY = 0; 
        let savedRoi = null;         

        const canvas = document.getElementById('interactionCanvas');
        const ctx = canvas.getContext('2d');
        
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 50) container.removeChild(container.firstChild);
        }
        
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/ws`;
            if (ws) ws.close();
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'blob';
            
            ws.onopen = () => {
                log('✅ 视频流已连接', 'success');
                document.getElementById('videoStream').style.display = 'block';
                document.getElementById('videoOverlay').style.display = 'none';
                resizeCanvas(); 
            };
            
            ws.onmessage = (e) => {
                if (e.data instanceof Blob) {
                    const img = document.getElementById('videoStream');
                    const oldUrl = img.src;
                    img.src = URL.createObjectURL(e.data);
                    if (oldUrl) URL.revokeObjectURL(oldUrl);
                }
            };
            
            ws.onclose = () => {
                log('❌ 视频流断开，尝试重连...', 'error');
                document.getElementById('videoStream').style.display = 'none';
                document.getElementById('videoOverlay').style.display = 'block';
                if (serviceRunning) setTimeout(initWebSocket, 2000); 
            };
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            renderCanvasLayers();
        }
        window.addEventListener('resize', resizeCanvas);

        function renderCanvasLayers() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isDrawing) {
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]); 
                ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
                ctx.setLineDash([]); 
            }
            if (savedRoi) {
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 3;
                ctx.strokeRect(savedRoi.x, savedRoi.y, savedRoi.w, savedRoi.h);
            }
        }

        function enableRoiSelection() {
            if (!serviceRunning) return log('⚠️ 请先启动服务！', 'warning');
            isRoiModeActive = true;
            canvas.style.cursor = 'crosshair';
            document.getElementById('btnSelectRoi').classList.add('btn-active-hunting');
            log('请在画面上拖拽框选目标', 'info');
        }

        async function resetTracking() {
            savedRoi = null;
            isRoiModeActive = false;
            canvas.style.cursor = 'default';
            document.getElementById('btnSelectRoi').classList.remove('btn-active-hunting');
            document.getElementById('boxCenterX').textContent = '-';
            document.getElementById('boxCenterY').textContent = '-';
            renderCanvasLayers();
            centerGimbal();
            try { 
                await fetch('/api/tracker/reset', { method: 'POST' }); 
                log('🔄 已停止跟踪，进入待机状态', 'info');
            } catch (e) {}
        }

        async function switchDetector() {
            const select = document.getElementById('detectorSelect');
            const method = select.value;
            try {
                const response = await fetch('/api/detector/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method: method })
                });
                const res = await response.json();
                if (res.status === 'success') {
                    const isDowngraded = (method === 'dnn' && !res.active_method.includes('dnn')) || 
                                         (method === 'lbp' && res.active_method !== 'lbp');
                    if (!isDowngraded) {
                        log(`✅ 检测器已切换为: ${res.active_method.toUpperCase()}`, 'success');
                    } else {
                        log(`⚠️ 请求 ${method.toUpperCase()} 失败(可能缺少模型)，已自动降级为: ${res.active_method.toUpperCase()}`, 'warning');
                        if (res.active_method.includes('dnn')) select.value = 'dnn';
                        else if (res.active_method === 'lbp') select.value = 'lbp';
                        else select.value = 'haar';
                    }
                } else {
                    log(`❌ 切换失败: ${res.reason}`, 'error');
                }
            } catch (e) {
                log('❌ 切换检测器请求失败', 'error');
            }
        }

        async function switchTracker() {
            const select = document.getElementById('trackerSelect');
            const method = select.value;
            try {
                const response = await fetch('/api/tracker/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method: method })
                });
                const res = await response.json();
                if (res.status === 'success') {
                    const actual = res.active_method;
                    const isDowngraded = (method !== actual);
                    if (!isDowngraded) {
                        log(`✅ 物体跟踪器已切换为: ${actual.toUpperCase()}`, 'success');
                    } else {
                        log(`⚠️ 请求 ${method.toUpperCase()} 失败，已自动降级为: ${actual.toUpperCase()}`, 'warning');
                        select.value = actual;
                    }
                } else {
                    log(`❌ 切换跟踪器失败: ${res.reason}`, 'error');
                }
            } catch (e) {
                log('❌ 切换物体跟踪器请求失败', 'error');
            }
        }

        function calculateMouseSpeed(clickX, clickY, width, height) {
            mouseCurrentYawSpeed = Math.max(-100, Math.min(100, Math.round((clickX / width - 0.5) * 300)));
            mouseCurrentPitchSpeed = Math.max(-100, Math.min(100, Math.round((0.5 - clickY / height) * 300)));
            if (Math.abs(mouseCurrentYawSpeed) < 5) mouseCurrentYawSpeed = 0;
            if (Math.abs(mouseCurrentPitchSpeed) < 5) mouseCurrentPitchSpeed = 0;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!serviceRunning) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;

            if (isRoiModeActive) {
                startX = currentX = clientX;
                startY = currentY = clientY;
                isDrawing = true;
            } else {
                isMouseGimbalInteracting = true;
                calculateMouseSpeed(clientX, clientY, rect.width, rect.height);
                if (mouseLoopInterval) clearInterval(mouseLoopInterval);
                sendGimbal(mouseCurrentYawSpeed, mouseCurrentPitchSpeed);
                mouseLoopInterval = setInterval(() => {
                    if (isMouseGimbalInteracting) sendGimbal(mouseCurrentYawSpeed, mouseCurrentPitchSpeed);
                }, 50);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX - rect.left;
            const clientY = e.clientY - rect.top;

            if (isDrawing) {
                currentX = clientX; currentY = clientY;
                renderCanvasLayers();
            } else if (isMouseGimbalInteracting) {
                calculateMouseSpeed(clientX, clientY, rect.width, rect.height);
            }
        });

        function terminateMouseControl() {
            if (isMouseGimbalInteracting) {
                isMouseGimbalInteracting = false;
                if (mouseLoopInterval) { clearInterval(mouseLoopInterval); mouseLoopInterval = null; }
                sendGimbal(0, 0);
            }
        }

        canvas.addEventListener('mouseup', (e) => {
            if (isDrawing) {
                isDrawing = false;
                const rect = canvas.getBoundingClientRect();
                const endX = e.clientX - rect.left;
                const endY = e.clientY - rect.top;
                const finalX = Math.min(startX, endX), finalY = Math.min(startY, endY);
                const finalW = Math.abs(currentX - startX), finalH = Math.abs(currentY - startY);

                if (finalW < 10 || finalH < 10) return renderCanvasLayers();

                document.getElementById('boxCenterX').textContent = `${Math.round(finalX + finalW / 2)} px`;
                document.getElementById('boxCenterY').textContent = `${Math.round(finalY + finalH / 2)} px`;

                submitRoiToBackend(finalX/rect.width, finalY/rect.height, finalW/rect.width, finalH/rect.height);
                savedRoi = null; 
                isRoiModeActive = false;
                canvas.style.cursor = 'default';
                document.getElementById('btnSelectRoi').classList.remove('btn-active-hunting');
                renderCanvasLayers();
            } else {
                terminateMouseControl();
            }
        });

        canvas.addEventListener('mouseleave', terminateMouseControl);

        async function submitRoiToBackend(x, y, w, h) {
            try {
                const response = await fetch('/api/tracker/init', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ x, y, width: w, height: h })
                });
                const res = await response.json();
                if (res.status === 'success') log('🚀 已发送框选坐标，后端正在初始化跟踪器...', 'success');
            } catch (e) {
                log('后端初始化失败', 'error');
            }
        }

        async function sendGimbal(yaw, pitch) {
            yaw = Math.max(-100, Math.min(100, parseInt(yaw || 0)));
            pitch = Math.max(-100, Math.min(100, parseInt(pitch || 0)));
            try {
                await fetch('/api/gimbal/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ yaw, pitch })
                });
                document.getElementById('statusYaw').textContent = yaw;
                document.getElementById('statusPitch').textContent = pitch;
            } catch (error) {}
        }
        
        function centerGimbal() {
            sendGimbal(0, 0);
            log('🎯 云台回中', 'info');
        }
        
        function updateConnectionStatus(online, msg = '') {
            const el = document.getElementById('connStatus');
            el.className = `connection-status ${online ? 'conn-ok' : 'conn-error'}`;
            el.textContent = online ? '🟢 已连接 ' + msg : '🔴 未连接 ' + msg;
        }
        
        function startService() {
            serviceRunning = true;
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            document.getElementById('mainStatus').textContent = '● 运行中';
            document.getElementById('mainStatus').style.color = '#00ff88';
            log('🚀 服务启动成功，当前处于待机状态', 'success');
            updateConnectionStatus(true);
            initWebSocket();
            centerGimbal();
            startKeyboardControl();
        }
        
        function stopService() {
            serviceRunning = false;
            if (ws) { ws.close(); ws = null; }
            if (controlInterval) clearInterval(controlInterval);
            if (mouseLoopInterval) clearInterval(mouseLoopInterval);
            isMouseGimbalInteracting = false;
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('mainStatus').textContent = '已停止';
            document.getElementById('mainStatus').style.color = '#ff6b6b';
            resetTracking();
            log('⏹ 系统安全停机', 'warning');
            updateConnectionStatus(false);
        }
        
        function startKeyboardControl() {
            document.addEventListener('keydown', (e) => {
                keysPressed[e.key.toLowerCase()] = true;
                if (e.code === 'Space') { e.preventDefault(); centerGimbal(); }
            });
            document.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });
            controlInterval = setInterval(() => {
                if (!serviceRunning || isMouseGimbalInteracting) return;
                const speed = keysPressed['shift'] ? 100 : 50;
                let yaw = 0, pitch = 0;
                if (keysPressed['w']) pitch = speed;
                if (keysPressed['s']) pitch = -speed;
                if (keysPressed['a']) yaw = -speed;
                if (keysPressed['d']) yaw = speed;
                if (yaw !== 0 || pitch !== 0) sendGimbal(yaw, pitch);
            }, 50);
        }
        
        setInterval(async () => {
            if (!serviceRunning) return;
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const modeEl = document.getElementById('modeIndicator');
                
                if (data.system_mode === 'manual') {
                    modeEl.textContent = '🎮 手动控制中 (松开自动恢复)';
                    modeEl.className = 'mode-indicator mode-manual';
                } else {
                    if (data.tracking_mode === 'object') {
                        modeEl.textContent = '🎯 物体跟踪中';
                        modeEl.className = 'mode-indicator mode-auto';
                    } else if (data.tracking_mode === 'face') {
                        modeEl.textContent = '🤖 人脸自动跟踪';
                        modeEl.className = 'mode-indicator mode-auto';
                    } else {
                        modeEl.textContent = '⏸️ 待机中 (请框选目标)';
                        modeEl.className = 'mode-indicator mode-idle';
                    }
                }
                
                const detectorEl = document.getElementById('currentDetector');
                if (detectorEl && data.detector_type) {
                    let displayType = data.detector_type.toUpperCase();
                    if (data.detector_type.includes('dnn')) displayType = 'DNN (高精度)';
                    else if (data.detector_type === 'lbp') displayType = 'LBP';
                    else if (data.detector_type === 'haar') displayType = 'Haar';
                    detectorEl.textContent = displayType;
                }

                // 核心修改：增加对 Hybrid 的显示支持
                const trackerEl = document.getElementById('currentTracker');
                if (trackerEl && data.tracker_type) {
                    let displayTracker = data.tracker_type.toUpperCase();
                    if (data.tracker_type === 'hybrid') displayTracker = 'Hybrid (融合跟踪)';
                    else if (data.tracker_type === 'dasiamrpn') displayTracker = 'DaSiamRPN (深度学习)';
                    else if (data.tracker_type === 'ssd') displayTracker = 'SSD (全局检测)';
                    else if (data.tracker_type === 'csrt') displayTracker = 'CSRT (高精度)';
                    else if (data.tracker_type === 'kcf') displayTracker = 'KCF (平衡)';
                    else if (data.tracker_type === 'mosse') displayTracker = 'MOSSE (极速)';
                    trackerEl.textContent = displayTracker;
                }
            } catch (e) {}
        }, 300);

        window.addEventListener('load', () => {
            log('系统初始化完成', 'success');
        });
    </script>
</body>
</html>
